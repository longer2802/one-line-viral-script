<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f0e8" />
    <meta
      name="description"
      content="輸入一句產品、故事或觀點，立即生成故事型短影音腳本。"
    />
    <link rel="stylesheet" href="./src/styles.css" />
    <title>Breakfast Life Studio｜早餐店人生觀察室</title>
  </head>
  <body>
    <main>
      <nav class="nav">
        <a class="brand" href="#" aria-label="一句話生成爆款腳本首頁">
          <span class="brand-mark">爆</span>
          <span>BREAKFAST LIFE STUDIO</span>
        </a>
        <div class="style-badge">
          <span class="live-dot"></span>
          AI 內容總監 v1.0
        </div>
      </nav>

      <div class="grain"></div>

      <section class="hero">
        <div class="eyebrow">
          <span>01</span>
          <span class="eyebrow-line"></span>
          <span>早餐店人生觀察室</span>
        </div>

        <h1>一件小事，<br /><em>看見一段人生。</em></h1>

        <p class="intro">
          放進早餐店發生的人事物、新品或一段觀察。<br />
          內容總監會先拆解人性，再產出四種可直接修改的拍攝腳本。
        </p>

        <form class="generator" id="generator">
          <div class="input-wrap" id="input-wrap">
            <span class="input-icon">✦</span>
            <textarea
              id="topic"
              maxlength="1000"
              rows="1"
              placeholder="例如：客人等了 10 分鐘，因為不知道還要等多久，最後直接離開…"
              aria-label="輸入產品、故事或觀點"
            ></textarea>
            <span class="count" id="count">0/1000</span>
          </div>
          <button class="generate-button" id="generate-button" type="submit">
            <span>生成內容企劃</span>
            <span class="arrow">↗</span>
          </button>
        </form>
        <p class="error-message" id="error" hidden></p>

        <div class="examples">
          <span>不知道寫什麼？試試</span>
          <button type="button" data-example="今天有一位客人等了 10 分鐘，因為不知道餐點還要多久，最後直接離開。">客人等待 <b>›</b></button>
          <button type="button" data-example="一個小朋友每次來店裡都在找上次拿到的貼紙，今天拿到新貼紙時非常開心，媽媽也跟著笑了。">小朋友貼紙 <b>›</b></button>
          <button type="button" data-example="新品：艾格森準備推出一款加入屏東在地食材的新口味蛋餅，希望讓外地客人也能吃到九如的味道。">在地新品 <b>›</b></button>
        </div>

        <div class="formula">
          <div><strong>早餐店老闆</strong><span>人情味</span></div>
          <span class="multiply">×</span>
          <div><strong>財富教練</strong><span>洞察力</span></div>
          <span class="multiply">×</span>
          <div><strong>故事敘事</strong><span>高留存</span></div>
        </div>
      </section>

      <section class="result-shell" id="result" hidden>
        <div class="result-header">
          <div>
            <p class="result-kicker">SCRIPT / GENERATED</p>
              <h2>內容總監企劃書</h2>
          </div>
          <div class="result-actions">
            <span>✎ 所有文字皆可修改</span>
            <button class="copy-button" id="copy-all" type="button">▣ 複製全部</button>
          </div>
        </div>

        <div id="result-content"></div>

        <button class="regenerate" id="regenerate" type="button">✦ 換一組企劃角度</button>
      </section>

      <footer>
        <span>BREAKFAST LIFE STUDIO v1.0</span>
        <span>從早餐店的小事，看見人生的大事。</span>
      </footer>
    </main>
    <script src="./src/scriptGenerator.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
